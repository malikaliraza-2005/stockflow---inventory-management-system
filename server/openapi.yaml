# IMS REST API — contract-first stub (Phase 0, task 0.5 · NFR-27 · R-7).
#
# Distilled from 05-REST-API-Specification.md (APPROVED). This file is the
# SOURCE the client types are generated from (client: npm run generate:types);
# CI fails if client/src/types drifts from it (openapi-drift gate).
#
# Growth rule: each feature's T-e task (IMP-020 §1) adds its §7 endpoints here,
# regenerates types, and commits both. Nothing is added ahead of its feature.
openapi: 3.1.0

info:
  title: IMS REST API
  version: 1.0.0
  description: >-
    Web-Based Inventory Management System API. Contract per REST-API
    Specification 05 (approved): additive evolution only within v1; clients
    MUST tolerate unknown response fields. All routes relative to /api/v1
    except GET /health and GET /ready (server root, ahead of limiters/auth).

servers:
  - url: /api/v1

security:
  - bearerAuth: []

tags:
  - name: system
    description: Health endpoints — server root, public, unlimited (05 §7.11)
  - name: auth
    description: Authentication & sessions — 05 §7.1 (F1). Refresh token travels only as an httpOnly cookie scoped to /api/v1/auth.

paths:
  /health:
    servers:
      - url: /
    get:
      tags: [system]
      operationId: getHealth
      summary: Liveness — process up (NFR-14, ARB-04)
      security: []
      responses:
        '200':
          description: Process is up. No auth, no rate limit, no business data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

  /ready:
    servers:
      - url: /
    get:
      tags: [system]
      operationId: getReady
      summary: Readiness — includes DB connectivity (NFR-15)
      description: >-
        Deploy gates and load-balancer checks target this endpoint. False
        during boot (before Mongo connect + integrity check) and after SIGTERM
        (drain) per BEA §8.
      security: []
      responses:
        '200':
          description: Ready to serve traffic.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyStatus'
        '503':
          description: Not ready (DB down / booting / draining). Carries Retry-After (NFR-20).
          headers:
            Retry-After:
              $ref: '#/components/headers/RetryAfter'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /auth/login:
    post:
      tags: [auth]
      operationId: login
      summary: Authenticate; set refresh cookie; return access token + profile (FR-AUTH-01/04, UC-01)
      description: >-
        Failure counter and lockout per BR-33; success resets the counter,
        stamps lastLoginAt, records a security event. Errors stay generic —
        the password policy is never revealed on this route (AAD §2).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: >-
            Session established. Also sets the rotating refresh cookie
            (httpOnly · Secure · SameSite=Strict · Path=/api/v1/auth).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          description: Bad credentials (generic — UNAUTHORIZED) or ACCOUNT_DEACTIVATED.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '423':
          description: ACCOUNT_LOCKED — 5 consecutive failures → 15-min lock (BR-33).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/refresh:
    post:
      tags: [auth]
      operationId: refreshSession
      summary: Rotate the refresh token; issue a new access token (FR-AUTH-02/06)
      description: >-
        Cookie-authenticated (no body). Reuse of a rotated token revokes the
        entire session family and records a security event (BR-35). Clients
        single-flight this call (ARB-03).
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Rotated session + new refresh Set-Cookie.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '401':
          description: Missing/expired/revoked/reused token (UNAUTHORIZED).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /auth/logout:
    post:
      tags: [auth]
      operationId: logout
      summary: Revoke the current refresh token; clear the cookie (FR-AUTH-03)
      description: Idempotent — revoking an already-revoked/unknown token still succeeds.
      responses:
        '204':
          description: Session revoked; expired Set-Cookie returned.
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/reset-password:
    post:
      tags: [auth]
      operationId: resetPassword
      summary: Complete an Admin-initiated reset (FR-AUTH-05, UC-03)
      description: >-
        Token is single-use, 30-min expiry, hashed at rest; success revokes
        all prior sessions and clears mustChangePassword.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '204':
          description: Password installed; all prior sessions revoked.
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          description: Invalid/expired/used token (UNAUTHORIZED).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/change-password:
    post:
      tags: [auth]
      operationId: changePassword
      summary: Change own password (FR-USER-05)
      description: >-
        Current password required and verified; revokes all OTHER sessions.
        One of the three calls a mustChangePassword session may make (AAD §2).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          description: Password changed; other sessions revoked.
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          description: Wrong current password, or missing/invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: refreshToken
      description: >-
        Rotating refresh session — httpOnly · Secure · SameSite=Strict,
        scoped to /api/v1/auth (AAD §3.2). Never appears in bodies or headers.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        Access token — 15-min TTL, payload sub/role/iat/exp only (SEC-01).
        The rotating refresh token travels exclusively as an httpOnly cookie
        scoped to /api/v1/auth and never appears in this contract's bodies.

  headers:
    XCorrelationId:
      description: Correlation ID echoed on every response (NFR-23, 05 §1).
      schema:
        type: string
    RetryAfter:
      description: Seconds to wait before retrying (NFR-20).
      schema:
        type: integer
        minimum: 0

  parameters:
    page:
      name: page
      in: query
      description: 1-based page number (05 §5).
      schema:
        type: integer
        minimum: 1
        default: 1
    limit:
      name: limit
      in: query
      description: Page size — hard cap 100; values above cap → VALIDATION_ERROR (NFR-10).
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    sort:
      name: sort
      in: query
      description: Sort field — sortable fields enumerated per endpoint; unknown → VALIDATION_ERROR.
      schema:
        type: string
    order:
      name: order
      in: query
      description: Sort direction companion to sort (APD-01). Default desc.
      schema:
        type: string
        enum: [asc, desc]
        default: desc

  responses:
    ValidationError:
      description: Request failed schema validation before the controller ran (05 §1).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Missing/invalid token, or account deactivated (UNAUTHORIZED | ACCOUNT_DEACTIVATED).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Role insufficient per the §5 permission matrix (FORBIDDEN).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Resource not found (NOT_FOUND).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    RateLimited:
      description: Rate limit exceeded (RATE_LIMITED, SEC-04).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    InternalError:
      description: Opaque internal error — correlation ID only, no internals (SEC-12).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ServiceUnavailable:
      description: DB down / not ready; carries Retry-After (NFR-20).
      headers:
        Retry-After:
          $ref: '#/components/headers/RetryAfter'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

  schemas:
    ErrorCode:
      type: string
      description: >-
        The CLOSED set of codes this API may emit — SRS §16.3 catalog plus the
        three documented APR-01 extensions (DUPLICATE_EMAIL, PRODUCT_NOT_EMPTY,
        PRODUCT_HAS_HISTORY). 05 §6.2.
      enum:
        - VALIDATION_ERROR
        - UNAUTHORIZED
        - ACCOUNT_DEACTIVATED
        - FORBIDDEN
        - NOT_FOUND
        - DUPLICATE_SKU
        - DUPLICATE_BARCODE
        - DUPLICATE_EMAIL
        - INSUFFICIENT_STOCK
        - STALE_WRITE
        - LAST_ADMIN
        - PRODUCT_ARCHIVED
        - PRODUCT_NOT_EMPTY
        - PRODUCT_HAS_HISTORY
        - CATEGORY_IN_USE
        - INVALID_BARCODE
        - IDEMPOTENCY_CONFLICT
        - ACCOUNT_LOCKED
        - RATE_LIMITED
        - INTERNAL_ERROR
        - SERVICE_UNAVAILABLE

    ValidationErrorDetail:
      type: object
      description: VALIDATION_ERROR uses details = array of these (05 §6.1).
      required: [field, message]
      properties:
        field:
          type: string
        message:
          type: string

    ErrorEnvelope:
      type: object
      description: The single error envelope every non-2xx JSON response uses (SRS §16.2, 05 §6.1).
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, correlationId]
          properties:
            code:
              $ref: '#/components/schemas/ErrorCode'
            message:
              type: string
              description: Human-readable; the frontend maps code → message via its own table (05 §6.2).
            details:
              description: Optional, code-specific payload (e.g. available/requested for INSUFFICIENT_STOCK).
            correlationId:
              type: string
              description: Echoes X-Correlation-Id — surfaced in error toasts (NFR-23).

    PaginationMeta:
      type: object
      description: >-
        List-envelope metadata (05 §5, FR-SRCH-03). Every list endpoint returns
        { data: [...], ...PaginationMeta }; data item types are per-endpoint.
      required: [page, limit, totalItems, totalPages]
      properties:
        page:
          type: integer
          minimum: 1
        limit:
          type: integer
          minimum: 1
          maximum: 100
        totalItems:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0

    Role:
      type: string
      description: The two operator roles (SRS §5 matrix).
      enum: [ADMIN, STAFF]

    LoginRequest:
      type: object
      description: 05 §15.1 — non-empty password only; policy never applied at login (AAD §2).
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          minLength: 1

    ResetPasswordRequest:
      type: object
      description: 05 §15.7 — BR-32 policy applies to newPassword.
      required: [token, newPassword]
      properties:
        token:
          type: string
          minLength: 1
        newPassword:
          type: string
          minLength: 10
          maxLength: 64

    ChangePasswordRequest:
      type: object
      description: 05 §15.7 — new ≠ current; BR-32 policy on newPassword.
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          minLength: 1
        newPassword:
          type: string
          minLength: 10
          maxLength: 64

    SessionUser:
      type: object
      description: The 05 §7.1 session user block — never carries credential fields (SEC-02).
      required: [id, name, email, role, mustChangePassword]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/Role'
        mustChangePassword:
          type: boolean

    SessionSettings:
      type: object
      description: >-
        FCM-01 (RATIFIED 2026-07-23): read-only display constants in the
        session payload — Staff has no other approved endpoint for them
        (GET /settings stays Admin-only). Additive, EXT-01-compliant;
        exposes no settings management. AAD §12 · SMA §5.
      required: [systemCurrency, movementWarningThreshold]
      properties:
        systemCurrency:
          type: string
          description: ISO 4217 code — feeds lib/formatters.
        movementWarningThreshold:
          type: integer
          minimum: 1
          description: Large-movement confirm threshold (BR-15) for the movement dialogs.

    SessionResponse:
      type: object
      description: Login/refresh 200 — access token + profile + FCM-01 display constants.
      required: [accessToken, user, settings]
      properties:
        accessToken:
          type: string
          description: JWT HS256, 15-min TTL, payload sub/role/iat/exp only (SEC-01).
        user:
          $ref: '#/components/schemas/SessionUser'
        settings:
          $ref: '#/components/schemas/SessionSettings'

    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]

    ReadyStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ready]
